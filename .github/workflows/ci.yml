name: pg_retrieval_engine-linux-cpu-ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  linux-cpu-build-test:
    runs-on: ubuntu-22.04

    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            ca-certificates \
            cmake \
            git \
            libfaiss-dev \
            libpq-dev \
            pkg-config

      - name: Ensure PostgreSQL build toolchain
        run: |
          need_install=1
          if command -v pg_config >/dev/null 2>&1; then
            incdir="$(pg_config --includedir-server 2>/dev/null || true)"
            if [ -n "$incdir" ] && [ -f "$incdir/postgres.h" ]; then
              need_install=0
              echo "Using preinstalled PostgreSQL toolchain: $(pg_config --version)"
            else
              echo "pg_config exists but server headers are missing, installing server-dev package"
            fi
          else
            echo "pg_config not found, installing PostgreSQL toolchain"
          fi

          if [ "$need_install" -eq 1 ]; then
            sudo apt-get update
            dev_pkg="$(apt-cache pkgnames | grep -E '^postgresql-server-dev-[0-9]+$' | sort -V | tail -n1)"

            if [ -z "$dev_pkg" ]; then
              echo "No versioned postgresql-server-dev-* package found."
              echo "Attempting fallback with postgresql-server-dev-all."
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
                postgresql \
                postgresql-server-dev-all
            else
              major="${dev_pkg#postgresql-server-dev-}"
              pg_pkg="postgresql-$major"
              echo "Installing $pg_pkg and $dev_pkg"
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y "$pg_pkg" "$dev_pkg"
            fi
          fi

          test -f "$(pg_config --includedir-server)/postgres.h"

      - name: Show toolchain versions
        run: |
          which pg_config
          pg_config --version
          cmake --version

      - name: Build and install pgvector (v0.8.2)
        run: |
          git clone --depth 1 --branch v0.8.2 https://github.com/pgvector/pgvector.git /tmp/pgvector
          make -C /tmp/pgvector PG_CONFIG="$(which pg_config)"
          sudo make -C /tmp/pgvector PG_CONFIG="$(which pg_config)" install

      - name: Build and install pg_retrieval_engine (CPU)
        working-directory: .
        run: |
          FAISS_CFLAGS="$(pkg-config --cflags faiss 2>/dev/null || true)"
          FAISS_LIBS="$(pkg-config --libs faiss 2>/dev/null || echo '-lfaiss')"
          echo "FAISS_CFLAGS=$FAISS_CFLAGS"
          echo "FAISS_LIBS=$FAISS_LIBS"
          make \
            PG_CONFIG="$(which pg_config)" \
            PG_CPPFLAGS="$FAISS_CFLAGS -std=c++17" \
            SHLIB_LINK="$FAISS_LIBS"
          sudo make \
            PG_CONFIG="$(which pg_config)" \
            PG_CPPFLAGS="$FAISS_CFLAGS -std=c++17" \
            SHLIB_LINK="$FAISS_LIBS" \
            install

      - name: Run basic regression test
        working-directory: .
        run: |
          make PG_CONFIG="$(which pg_config)" installcheck
